# Nginx snippet: expose the prog-validate MCP service at https://<host>/mcp/.
#
# Paste these location blocks INSIDE the existing
#   server { server_name eliozo.dudajevagatve.lv; ... }
# block (the same one that already proxies /eliozo). Do not add a new server
# block. Then:  sudo nginx -t && sudo systemctl reload nginx
#
# The upstream is the uvicorn process from deploy/prog-validate.service
# (127.0.0.1:8001). MCP streamable-http uses Server-Sent Events, so response
# buffering MUST be off and read timeouts long.

# Exact /mcp (no trailing slash) — MCP clients POST here.
location = /mcp {
    proxy_pass http://127.0.0.1:8001;
    include /etc/nginx/proxy_params;          # or the proxy_set_header lines below
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;                      # required for SSE streaming
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# Everything under /mcp/ (and the REST debug routes /api/v1/... if you want them
# reachable, they are served by the same process).
location /mcp/ {
    proxy_pass http://127.0.0.1:8001;
    include /etc/nginx/proxy_params;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

# If /etc/nginx/proxy_params is not present on this server, replace the
# `include` lines above with:
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
